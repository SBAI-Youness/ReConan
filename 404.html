<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1d2634;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            margin: 0 0 0.5rem 0;
            font-weight: 600;
        }

        .description {
            font-size: 1.2rem;
            color: #849aa7;
            margin: 0 0 2rem 0;
        }

        a {
            color: #ea6d36;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p class="description">Oops! The page you're looking for doesn't exist.</p>
        <a href="index.html">← Go Back Home</a>
    </div>
</body>
</html>
