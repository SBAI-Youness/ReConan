<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReConan</title>
    <meta name="description" content="ReConan is a Desktop-based OSINT and cyber investigation platform.">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #1d2634;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            font-weight: 600;
        }

        .description {
            font-size: 1.1rem;
            color: #849aa7;
            line-height: 1.6;
            margin: 0;
        }

        .description strong {
            color: #ffffff;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/icon.png" alt="ReConan Logo" class="logo">
        <h1>ReConan</h1>
        <p class="description">
            A Desktop-based OSINT and Cyber Investigation Platform.
        </p>
    </div>
</body>
</html>
